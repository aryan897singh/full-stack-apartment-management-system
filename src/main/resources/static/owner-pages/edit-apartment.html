<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Apartment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content-wrapper { flex-grow: 1; }
        .navbar { background-color: #1e1e1e !important; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5); }
        .navbar-brand { font-weight: 600; color: #f8f9fa !important; }
        .nav-link { color: #adb5bd !important; }
        .nav-link:hover { color: #ffffff !important; }
        .card { background-color: #1e1e1e; border: 1px solid #343a40; border-radius: 8px; }
        h2 { color: #f8f9fa; font-weight: 300; }
        footer { background-color: #1e1e1e; padding: 1rem 0; text-align: center; border-top: 1px solid #343a40; margin-top: auto; }
        footer p { margin: 0; font-size: 0.8rem; color: #6c757d; }
        .profile-circle {
            width: 40px; height: 40px; background-color: #007bff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; color: #fff; cursor: pointer; text-decoration: none;
        }
        .form-label, .form-check-label { color: #ffffff; }
        .form-control, .form-select {
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #ffffff;
        }
        .form-control:focus, .form-select:focus {
            background-color: #383838;
            border-color: #007bff;
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/owner-pages/Dashboard.html">
            <span id="nav-brand-app-name">Loading...</span>
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/owner-pages/Dashboard.html">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/owner-pages/apartments.html">Tenants</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/owner-pages/payments.html">Payments</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/owner-pages/maintenance.html">Maintenance</a>
                </li>
            </ul>
            <a href="/owner-pages/configuration.html" class="profile-circle me-2" title="Profile Details">AS</a>
        </div>
    </div>
</nav>

<div class="content-wrapper">
    <div class="container mt-4">
        <h2 class="mb-4">Edit Apartment Details</h2>

        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div id="alert-message" class="alert" role="alert" style="display: none;"></div>

                <div class="card p-4 mb-4">
                    <form id="edit-apartment-form">
                        <div class="mb-3">
                            <label for="flatNumber" class="form-label">Flat Number</label>
                            <input type="text" class="form-control" id="flatNumber" name="flatNumber" required>
                        </div>
                        <div class="mb-3">
                            <label for="expectedRent" class="form-label">Expected Rent</label>
                            <input type="number" step="0.01" class="form-control" id="expectedRent" name="expectedRent">
                        </div>
                        <div class="mb-3">
                            <label for="rentAmount" class="form-label">Actual Rent (Negotiated)</label>
                            <input type="number" step="0.01" class="form-control" id="rentAmount" name="rentAmount">
                        </div>
                        <div class="mb-3">
                            <label for="maintenanceAmount" class="form-label">Maintenance Fee</label>
                            <input type="number" step="0.01" class="form-control" id="maintenanceAmount" name="maintenanceAmount">
                        </div>

                        <hr style="border-top: 1px solid #444;">
                        <h5 class="mb-3">Monthly Payment Overrides</h5>
                        <p class="text-muted small">Only change these if you need to manually correct a payment record.</p>

                        <div class="mb-3">
                            <label for="paidRent" class="form-label">Rent Paid (This Month)</label>
                            <input type="number" step="0.01" class="form-control" id="paidRent" name="paidRent">
                        </div>
                        <div class="mb-3">
                            <label for="paidMaintenance" class="form-label">Maintenance Paid (This Month)</label>
                            <input type="number" step="0.01" class="form-control" id="paidMaintenance" name="paidMaintenance">
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5">
    <p>Made by Aryan Singh :)</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/config-loader.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Get settings for navbar
        const settings = await getAppSettings();
        document.getElementById('nav-brand-app-name').textContent = settings.APARTMENT_NAME;

        // 1. Read the apartmentId from the URL
        const params = new URLSearchParams(window.location.search);
        const apartmentId = params.get('apartmentId');
        const form = document.getElementById('edit-apartment-form');
        const alertBox = document.getElementById('alert-message');

        if (!apartmentId) {
            showAlert('Error: No apartment ID specified. Redirecting...', 'danger');
            setTimeout(() => window.location.href = 'apartments.html', 2000);
            return;
        }

        // 2. Fetch existing apartment data
        try {
            // Uses your existing GET /apartments/{id} endpoint
            const response = await fetch(`/apartments/${apartmentId}`);
            if (!response.ok) {
                throw new Error('Failed to fetch apartment details');
            }
            const apartment = await response.json(); // This is your ApartmentDto

            // 3. Populate the form
            document.getElementById('flatNumber').value = apartment.flatNumber;
            document.getElementById('expectedRent').value = apartment.expectedRent;
            document.getElementById('rentAmount').value = apartment.rentAmount;
            document.getElementById('maintenanceAmount').value = apartment.maintenanceAmount;
            document.getElementById('paidRent').value = apartment.paidRent;
            document.getElementById('paidMaintenance').value = apartment.paidMaintenance;

        } catch (error) {
            console.error(error);
            showAlert('Error loading apartment data. Please go back and try again.', 'danger');
        }

        // 4. Handle the form submission
        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            // Build the UpdateApartmentDto from form values
            // This matches the DTO your backend 'updateApartmentById' method expects
            const updatedApartmentDto = {
                flatNumber: document.getElementById('flatNumber').value,
                expectedRent: document.getElementById('expectedRent').value,
                rentAmount: document.getElementById('rentAmount').value,
                maintenanceAmount: document.getElementById('maintenanceAmount').value,
                paidRent: document.getElementById('paidRent').value,
                paidMaintenance: document.getElementById('paidMaintenance').value
            };

            try {
                // Send the PUT request
                const response = await fetch(`/apartments/update/${apartmentId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedApartmentDto)
                });

                if (!response.ok) {
                    throw new Error('Failed to save changes.');
                }

                showAlert('Changes saved successfully! Redirecting...', 'success');
                // We need to pass a tenantId back, but this page doesn't know it.
                // The safest bet is to go back to the main Tenants page.
                setTimeout(() => {
                    window.location.href = `apartments.html`;
                }, 1500);

            } catch (error) {
                console.error(error);
                showAlert('Error saving changes. Please try again.', 'danger');
            }
        });

        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = 'alert alert-' + type;
            alertBox.style.display = 'block';
            window.scrollTo(0, 0);
        }
    });
</script>

</body>
</html>
