<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tenant Payment History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {

            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content-wrapper {
            flex-grow: 1;
        }
        .navbar {
            background-color: #1e1e1e !important;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }
        .navbar-brand {
            font-weight: 600;
            color: #f8f9fa !important;
        }
        .nav-link {
            color: #adb5bd !important;
        }
        .nav-link.active, .nav-link:hover {
            color: #ffffff !important;
            border-bottom: 2px solid #007bff;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #343a40;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .card-title {
            color: #f8f9fa;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        h2 {
            font-weight: 300;
            color: #f8f9fa;
        }
        .table-dark-custom {
            background-color: #1e1e1e !important;
            color: #e0e0e0 !important;
        }
        .table-dark-custom thead th {
            border-bottom: 1px solid #343a40 !important;
            color: #adb5bd !important;
        }
        .table-dark-custom tbody td {
            border-bottom: 1px solid #2d2d2d !important;
        }
        .table-dark-custom.table-hover tbody tr:hover {
            background-color: #2a2a2a !important;
        }
        footer {
            background-color: #1e1e1e;
            padding: 1rem 0;
            text-align: center;
            border-top: 1px solid #343a40;
            margin-top: auto;
        }
        footer p {
            margin: 0;
            font-size: 0.8rem;
            color: #6c757d;
        }
        .profile-circle {
            width: 40px;
            height: 40px;
            background-color: #007bff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/OWNER_PAGES/Dashboard.html">
            <span id="nav-brand-app-name">Loading...</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/OWNER_PAGES/Dashboard.html">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/OWNER_PAGES/Tenants.html">Tenants</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/OWNER_PAGES/payments.html">Payments</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/OWNER_PAGES/maintenance.html">Maintenance</a>
                </li>
            </ul>
            <a href="/OWNER_PAGES/configuration.html" class="profile-circle me-2" title="Profile Details">AS</a>
        </div>
    </div>
</nav>

<div class="content-wrapper">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Tenant Payment History</h2>
            <a href="/OWNER_PAGES/add-new-payment.html" class="btn btn-primary">Add New Payment</a>
        </div>

        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-borderless table-dark-custom">
                    <thead>
                    <tr>
                        <th scope="col">Flat No.</th>
                        <th scope="col">Rent</th>
                        <th scope="col">Maintenance</th>
                        <th scope="col">Electricity</th>
                        <th scope="col">Date</th>
                        <th scope="col" class="text-end">Actions</th> </tr>
                    </thead>
                    <tbody id="payments-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>Made by Aryan Singh :)</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/config-loader.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const fetchPayments = fetch('/payments/getAllPayments')
            .then(function(response) {
                if (!response.ok) {
                    throw Error(response.statusText);
                }
                return response.json();
            });

        const fetchSettings = getAppSettings();
        const tableBody = document.getElementById('payments-table-body');

        Promise.all([fetchPayments, fetchSettings])
            .then(function(results){
                const data = results[0];
                const settings = results[1];
                const CURRENCY_SYMBOL = settings.CURRENCY_SYMBOL || '₹';

                document.getElementById('nav-brand-app-name').textContent = settings.APARTMENT_NAME;

                let htmlString = '';

                for(var i = 0; i < data.length; i++){
                    var payment = data[i];

                    var formattedRentAmount  = new Intl.NumberFormat('en-IN').format(payment.rentAmount);
                    var formattedMaintenanceAmount  = new Intl.NumberFormat('en-IN').format(payment.maintenanceAmount);
                    var formattedElectricityAmount  = new Intl.NumberFormat('en-IN').format(payment.electricityAmount);

                    var paymentDate = new Date(payment.paymentDate);
                    var year = paymentDate.getFullYear();
                    var month = (paymentDate.getMonth() + 1).toString().padStart(2, '0');
                    var day = paymentDate.getDate().toString().padStart(2, '0');
                    var formattedDate = day + '-' + month +  '-' + year ;

                    // Added a 'data-row-id' to the <tr> for easy removal
                    var row = `<tr id="payment-row-${payment.id}">`;
                    row += '<td>' + payment.flatNumber + '</td>';
                    row += '<td>' + CURRENCY_SYMBOL + formattedRentAmount + '</td>';
                    row += '<td>' + CURRENCY_SYMBOL + formattedMaintenanceAmount + '</td>';
                    row += '<td>' + CURRENCY_SYMBOL + formattedElectricityAmount + '</td>';
                    row += '<td>' + formattedDate + '</td>';

                    // --- NEW ACTIONS BUTTONS ---
                    row += `<td class="text-end">
                                <a href="/OWNER_PAGES/edit-payment.html?paymentId=${payment.id}" class="btn btn-sm btn-outline-info me-1">Edit</a>
                                <button class="btn btn-sm btn-outline-danger btn-delete-payment" data-payment-id="${payment.id}">Delete</button>
                            </td>`;
                    row += '</tr>';

                    htmlString += row;
                }
                tableBody.innerHTML = htmlString;
            })
            .catch(function(error){
                console.log(error);
                alert('Failed to load payment records, please try again');
            });

        // --- NEW DELETE LOGIC ---
        tableBody.addEventListener('click', function(event) {
            if (event.target.classList.contains('btn-delete-payment')) {
                const paymentId = event.target.dataset.paymentId;

                if (confirm('Are you sure you want to delete this payment record? This action cannot be undone.')) {
                    fetch(`/payments/deletePayment/${paymentId}`, {
                        method: 'DELETE'
                    })
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Failed to delete payment.');
                            }
                            // Success: remove the table row from the UI
                            document.getElementById(`payment-row-${paymentId}`).remove();
                        })
                        .catch(error => {
                            console.error(error);
                            alert('Error: Could not delete payment record.');
                        });
                }
            }
        });
    });
</script>
</body>
</html>
