# ==========================================
# ENTRA ID OAUTH2 CLIENT CONFIGURATION
# ==========================================

#1. The client ID
spring.security.oauth2.client.registration.entra-id.client-id=2d0005c4-965a-460e-a603-bf54b5bc1055

#2. The client secret generated by the authorization server (Entra ID)
#NOTE: INJECTED AS AN ENVIRONMENT VARIABLE - Add to env vars when deploying to azure
spring.security.oauth2.client.registration.entra-id.client-secret=${ENTRA_ID_SECRET}

#3. What data is my application asking from Microsoft about the user's account?
#NOTE:
#openid is mandatory because it tells EntraID you want to use OpenID Connect to verify the user's identity.
#profile requests basic info like name and preferred name
#and email requests the email address
#NOTE: You can ask for things like read calendar or files if needed for a cool app
spring.security.oauth2.client.registration.entra-id.scope=openid, profile, email

#4. This tells Spring Boot which Oauth2 "flow" to use, and so because we are using web browser
#we use the authorization_code
spring.security.oauth2.client.registration.entra-id.authorization-grant-type=authorization_code

#5. This is the redirect URI. Once the user authenticates themselves, the auth server will send
# the access code via browser to the client, so that the client can proceed to present the code
# and it's client id and secret to obtain the JWT token.
# NOTE: We define the redirect uri IN BOTH application.properties and Azure
# The {baseUrl} is a placeholder for the http://localhost:8080 or
# whatever incoming request (Spring is smart, it will change if we get a domain name and a request
# is sent on that domain name) and the rest is default defined by
# Spring Security so we don't have to deal with the handling of the code and presenting it to
# the auth server to obtain the JWT token
#NOTE: That we are using .properties and not .yml so we defined the registration id as entra-id
#SEE BELOW FOR WHAT THIS WOULD LOOK LIKE IN YML
spring.security.oauth2.client.registration.entra-id.redirect-uri={baseUrl}/login/oauth2/code/entra-id

spring.security.oauth2.client.provider.entra-id.issuer-uri=https://login.microsoftonline.com/21696173-c883-4a8f-ab46-a3c6a89bdfdd/v2.0

#NOTE: THE WHOLE FILE WOULD LOOK LIKE THIS IF WRITTEN IN YML:
#spring:
#   security:
#       oauth2:
#           client:
#               registration:
#                   entra-id: <- THIS IS THE {registrationId}
#                       client-id: ...
#                       client-secret: ...
#                       redirect-uri: ...

